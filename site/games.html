<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Games — World Cup 2026 Sweepstake</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Filters */
      .filters {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .filter {
        font: inherit;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-muted);
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.35rem 1rem;
        cursor: pointer;
      }

      .filter:hover {
        color: var(--text);
      }

      .filter.active {
        color: #ffffff;
        background: var(--blue);
        border-color: var(--blue);
      }

      /* Day cards */
      .card.day h2 {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        text-transform: none;
        letter-spacing: 0.02em;
        font-size: 1rem;
        color: var(--text);
      }

      .today-badge {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #ffffff;
        background: var(--green);
        border-radius: 999px;
        padding: 0.15rem 0.6rem;
      }

      /* Match rows */
      .match {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 0.75rem;
        padding: 0.9rem 0.25rem;
        border-bottom: 1px dashed var(--border);
      }

      .match:last-child {
        border-bottom: none;
        padding-bottom: 0.25rem;
      }

      .side {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        min-width: 0;
      }

      .side.home {
        align-items: flex-end;
        text-align: right;
      }

      .side.away {
        align-items: flex-start;
        text-align: left;
      }

      .side .team {
        font-weight: 600;
        line-height: 1.2;
      }

      .match.played .side.loser .team {
        color: var(--text-muted);
        font-weight: 500;
      }

      .match.played .side.winner .team {
        color: var(--green);
        font-weight: 700;
      }

      .chip {
        --chip: #5d7186;
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--chip);
        background: color-mix(in srgb, var(--chip) 10%, #ffffff);
        border: 1px solid color-mix(in srgb, var(--chip) 35%, #ffffff);
        border-radius: 999px;
        padding: 0.12rem 0.55rem;
        white-space: nowrap;
      }

      .centre {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.15rem;
        min-width: 4.5rem;
      }

      .centre .score {
        font-size: 1.3rem;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: var(--blue);
        white-space: nowrap;
      }

      .centre .kickoff {
        font-size: 1rem;
        font-weight: 700;
        color: var(--blue);
        background: var(--bg-card-soft);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.25rem 0.6rem;
        white-space: nowrap;
      }

      .centre .state {
        font-size: 0.65rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
      }

      .match .meta {
        grid-column: 1 / -1;
        text-align: center;
        font-size: 0.72rem;
        color: var(--text-muted);
      }

      .match.live {
        background: linear-gradient(90deg, rgba(225, 29, 46, 0.06), transparent 65%);
        border-radius: 10px;
      }

      .state.live {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        color: var(--red);
      }

      .state.live::before {
        content: "";
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--red);
        animation: live-pulse 1.4s ease-in-out infinite;
      }

      @keyframes live-pulse {
        0%, 100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.7);
        }
      }

      .empty {
        text-align: center;
        color: var(--text-muted);
        padding: 1rem 0;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="kicker">Canada · Mexico · USA 2026</div>
        <h1>⚽ World Cup Sweepstake</h1>
        <p>Results and upcoming fixtures — who's playing whom</p>
      </header>

      <nav class="tabs">
        <a class="tab" href="index.html">Leaderboard</a>
        <a class="tab active" href="games.html">Games</a>
      </nav>

      <div class="filters">
        <button class="filter active" data-filter="upcoming">Upcoming</button>
        <button class="filter" data-filter="played">Results</button>
        <button class="filter" data-filter="all">All</button>
      </div>

      <div id="games"></div>

      <p id="status"></p>
    </main>

    <script>
      const GAMES_URL = "data/games.json";

      const PLAYER_COLORS = {
        Dan: "#0c4da2",
        Mum: "#e11d2e",
        Dad: "#00a651",
        Matthew: "#7c3aed",
        Naomi: "#db2777",
      };

      let games = [];
      let filter = "upcoming";

      async function loadGames() {
        const status = document.getElementById("status");

        try {
          const response = await fetch(GAMES_URL, { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`Request failed: ${response.status}`);
          }

          const data = await response.json();
          games = data.games;
          renderGames();

          const updated = new Date(data.updated_at);
          status.textContent = `Games last updated: ${formatLondonTime(updated)}`;
        } catch (error) {
          status.textContent = `Unable to load games: ${error.message}`;
        }
      }

      function renderGames() {
        const container = document.getElementById("games");
        container.innerHTML = "";

        const visible = games.filter((game) =>
          filter === "all" ? true : filter === "played" ? game.played : !game.played
        );

        // Most recent first for results/all; upcoming stays chronological.
        // Sort is stable, so matches within the same date keep their order.
        if (filter === "played" || filter === "all") {
          visible.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
        }

        if (visible.length === 0) {
          const empty = document.createElement("section");
          empty.className = "card";

          const message = document.createElement("p");
          message.className = "empty";
          message.textContent =
            filter === "played"
              ? "No games have been played yet."
              : "No upcoming games found.";

          empty.append(message);
          container.append(empty);
          return;
        }

        const now = Date.now();
        const todayIso = londonDateString(new Date(now));

        let currentLabel = null;
        let section = null;

        visible.forEach((game) => {
          const label = game.date_label || "Date TBC";

          if (label !== currentLabel) {
            currentLabel = label;

            section = document.createElement("section");
            section.className = "card day";

            const heading = document.createElement("h2");
            heading.textContent = label;

            if (game.date === todayIso) {
              const badge = document.createElement("span");
              badge.className = "today-badge";
              badge.textContent = "Today";
              heading.append(badge);
            }

            section.append(heading);
            container.append(section);
          }

          section.append(renderMatch(game, now));
        });
      }

      function formatLondonTime(date) {
        return date.toLocaleString("en-GB", {
          timeZone: "Europe/London",
          dateStyle: "medium",
          timeStyle: "short",
        });
      }

      function londonDateString(date) {
        return date.toLocaleDateString("en-CA", { timeZone: "Europe/London" });
      }

      // A game runs ~3 hours covering stoppage time, half-time, extra time
      // and penalties.
      const LIVE_WINDOW_MS = 3 * 60 * 60 * 1000;

      function getKickoff(game) {
        if (!game.kickoff) return null;

        const kickoff = new Date(game.kickoff);
        return Number.isNaN(kickoff.getTime()) ? null : kickoff;
      }

      function hasScore(game) {
        return game.home.score !== null && game.away.score !== null;
      }

      function isLive(game, now) {
        if (game.played) return false;

        // FIFA stops reporting a kickoff time once a match starts, so a
        // posted score is the most reliable sign a game is in progress.
        if (hasScore(game)) return true;

        const kickoff = getKickoff(game);
        if (!kickoff) return false;

        const elapsed = now - kickoff.getTime();
        return elapsed >= 0 && elapsed < LIVE_WINDOW_MS;
      }

      function renderMatch(game, now) {
        const live = isLive(game, now);

        const match = document.createElement("div");
        match.className = game.played ? "match played" : live ? "match live" : "match";

        match.append(
          renderSide(game, game.home, "home"),
          renderCentre(game, live),
          renderSide(game, game.away, "away"),
          renderMeta(game)
        );

        return match;
      }

      function renderSide(game, team, position) {
        const side = document.createElement("div");
        side.className = `side ${position}`;

        // Only mark winner/loser for decided games (not draws).
        if (game.played && (game.home.winner || game.away.winner)) {
          side.classList.add(team.winner ? "winner" : "loser");
        }

        const name = document.createElement("div");
        name.className = "team";
        name.textContent = team.name;
        side.append(name);

        if (team.player) {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.style.setProperty("--chip", PLAYER_COLORS[team.player] || "#5d7186");
          chip.textContent = team.player;
          side.append(chip);
        }

        return side;
      }

      // Knockout games decided on penalties carry a shoot-out tally that
      // sits on the outer side of each team's score, e.g. "1 (3) – (4) 1".
      function formatPenalty(team) {
        return team.penalties == null ? "" : ` (${team.penalties})`;
      }

      function renderCentre(game, live) {
        const centre = document.createElement("div");
        centre.className = "centre";

        const main = document.createElement("div");

        if (game.played || live) {
          main.className = "score";
          main.textContent =
            `${game.home.score ?? 0}${formatPenalty(game.home)} – ` +
            `${formatPenalty(game.away)}${game.away.score ?? 0}`;
        } else {
          main.className = "kickoff";
          main.textContent = game.time || game.status || "vs";
        }

        centre.append(main);

        if (live) {
          const state = document.createElement("div");
          state.className = "state live";
          state.textContent = "Live";
          centre.append(state);
        } else if (game.played && game.status) {
          const state = document.createElement("div");
          state.className = "state";
          state.textContent = game.status;
          centre.append(state);
        }

        return centre;
      }

      function renderMeta(game) {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = [game.stage, game.group, game.venue]
          .filter(Boolean)
          .join(" · ");
        return meta;
      }

      document.querySelectorAll(".filter").forEach((button) => {
        button.addEventListener("click", () => {
          filter = button.dataset.filter;

          document
            .querySelectorAll(".filter")
            .forEach((b) => b.classList.toggle("active", b === button));

          renderGames();
        });
      });

      loadGames();
      setInterval(loadGames, 60_000);
    </script>
  </body>
</html>
